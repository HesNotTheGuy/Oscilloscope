<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DSO-1 — Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }
    #display-canvas {
      display: block;
      width: 100%; height: 100%;
    }
    #waiting {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a3a1a;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      pointer-events: none;
    }
    #close-overlay {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-size: 20px;
      line-height: 38px;
      text-align: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
      pointer-events: none;
      font-family: Arial, sans-serif;
    }
    #close-overlay:hover {
      background: rgba(255,60,60,0.6);
    }
    body.show-close #close-overlay {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <canvas id="display-canvas"></canvas>
  <div id="waiting">WAITING FOR SIGNAL…</div>
  <div id="close-overlay" title="Close display">✕</div>

  <script>
    const canvas  = document.getElementById('display-canvas');
    const ctx     = canvas.getContext('2d');
    const waiting = document.getElementById('waiting');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Draw incoming frames maintaining aspect ratio
    const img = new Image();
    img.onload = () => {
      waiting.style.display = 'none';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const scale = Math.min(
        canvas.width  / img.naturalWidth,
        canvas.height / img.naturalHeight
      );
      const w = img.naturalWidth  * scale;
      const h = img.naturalHeight * scale;
      ctx.drawImage(img,
        (canvas.width  - w) / 2,
        (canvas.height - h) / 2,
        w, h
      );
    };

    window.displayAPI.onFrame(dataURL => { img.src = dataURL; });

    // ── Close overlay: show on mouse move, hide after idle ──
    let _hideTimer = null;
    document.addEventListener('mousemove', () => {
      document.body.classList.add('show-close');
      clearTimeout(_hideTimer);
      _hideTimer = setTimeout(() => document.body.classList.remove('show-close'), 2500);
    });

    document.getElementById('close-overlay').addEventListener('click', () => {
      window.displayAPI.requestClose();
    });

    // Escape key closes the display window
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.displayAPI.requestClose();
    });
  </script>
</body>
</html>
